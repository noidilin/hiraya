<!DOCTYPE html>
<html>
<head>
    <title>Debug Images</title>
</head>
<body>
    <h1>Image Debug Test</h1>
    <h2>1970s Prairie Midi Dress should show:</h2>
    <img src="/product-images/1970s-prairie-midi-dress.jpg" alt="1970s Prairie Midi Dress" style="border: 1px solid red; width: 200px; height: 200px;">
    
    <h2>1990s Leather Shoulder Bag should show:</h2>
    <img src="/product-images/1990s-leather-shoulder-bag.jpg" alt="1990s Leather Shoulder Bag" style="border: 1px solid red; width: 200px; height: 200px;">
    
    <h2>Suede Block Heel Boots should show:</h2>
    <img src="/product-images/suede-block-heel-boots.jpg" alt="Suede Block Heel Boots" style="border: 1px solid red; width: 200px; height: 200px;">
    
    <h2>Raw API Test:</h2>
    <div id="api-result"></div>
    
    <script>
        // Test the API directly
        fetch('http://localhost:3000/api/products')
            .then(response => response.json())
            .then(data => {
                const products = data.data.products;
                console.log('API Products:', products);
                
                products.forEach(product => {
                    const div = document.createElement('div');
                    div.innerHTML = `
                        <h3>${product.name}</h3>
                        <p>Image URL: ${product.imageUrl}</p>
                        <img src="${product.imageUrl}" alt="${product.name}" style="border: 1px solid blue; width: 100px; height: 100px;">
                        <hr>
                    `;
                    document.getElementById('api-result').appendChild(div);
                });
            })
            .catch(error => console.error('API Error:', error));
    </script>
</body>
</html>
