name: infra-destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type: destroy dev platform"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: hiraya-infra-dev-platform
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  TF_STATE_BUCKET: devops-hiraya-dev-tf-state
  TF_PLATFORM_STATE_KEY: devops-hiraya-dev/dev/platform/terraform.tfstate
  INFRA_APPLY_ROLE_ARN: arn:aws:iam::549475122024:role/devops-hiraya-dev-github-infra-apply
  DESTROY_CONFIRMATION: destroy dev platform

jobs:
  preflight:
    name: Validate destroy request
    runs-on: ubuntu-latest

    steps:
      - name: Require main branch and typed confirmation
        env:
          CONFIRM_INPUT: ${{ inputs.confirm }}
          WORKFLOW_REF: ${{ github.ref }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${WORKFLOW_REF}" != "refs/heads/main" ]]; then
            echo "Dev platform destroy may only run from the main branch." >&2
            exit 1
          fi

          if [[ "${CONFIRM_INPUT}" != "${DESTROY_CONFIRMATION}" ]]; then
            echo "Confirmation did not match. Type exactly: ${DESTROY_CONFIRMATION}" >&2
            exit 1
          fi

  destroy:
    name: Destroy disposable dev platform
    needs: preflight
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install toolchain
        uses: jdx/mise-action@156251fcc627ac4e26cb0f93dd47d1d4979abf24 # v3.3.0
        with:
          install: true
          cache: true

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ env.INFRA_APPLY_ROLE_ARN }}
          role-session-name: hiraya-infra-destroy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate platform backend config
        shell: bash
        run: .github/scripts/write-platform-backend.sh

      - name: Initialize platform Terraform
        shell: bash
        run: terraform -chdir=infra/envs/dev/platform init -backend-config=backend.hcl -reconfigure -input=false

      - name: Capture platform identifiers
        id: platform
        shell: bash
        run: |
          set -euo pipefail

          capture_output() {
            local name="$1"
            local value
            value=$(terraform -chdir=infra/envs/dev/platform output -raw "$name" 2>/dev/null || true)
            if [[ -z "$value" ]]; then
              echo "Terraform output ${name} is empty; destroy verification would be unsafe." >&2
              exit 1
            fi
            printf '%s=%s\n' "$name" "$value" >> "$GITHUB_OUTPUT"
          }

          capture_output cluster_name
          capture_output vpc_id
          capture_output edge_load_balancer_name

      - name: Destroy disposable platform stack
        shell: bash
        run: terraform -chdir=infra/envs/dev/platform destroy -input=false -auto-approve

      - name: Verify platform removal and durable resources
        env:
          CLUSTER_NAME: ${{ steps.platform.outputs.cluster_name }}
          VPC_ID: ${{ steps.platform.outputs.vpc_id }}
          EDGE_LOAD_BALANCER_NAME: ${{ steps.platform.outputs.edge_load_balancer_name }}
        shell: bash
        run: .github/scripts/platform-destroy-verify.sh
