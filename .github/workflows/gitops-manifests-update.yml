name: gitops-manifest-update

run-name: Update ${{ inputs.service }} to ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend
      version:
        description: "Image tag/version to deploy"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: hiraya-gitops-dev-${{ inputs.service }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  AWS_ACCOUNT_ID: "549475122024"

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main

      - name: Resolve service metadata
        id: service
        env:
          SERVICE: ${{ inputs.service }}
        shell: bash
        run: |
          set -euo pipefail

          case "$SERVICE" in
            auth)
              repository="hiraya-auth"
              manifest="gitops/k8s/backend/auth.yml"
              ;;
            gateway)
              repository="hiraya-gateway"
              manifest="gitops/k8s/backend/gateway.yml"
              ;;
            orders)
              repository="hiraya-orders"
              manifest="gitops/k8s/backend/orders.yml"
              ;;
            order-service)
              repository="hiraya-order-service"
              manifest="gitops/k8s/backend/order-service.yml"
              ;;
            product-service)
              repository="hiraya-product-service"
              manifest="gitops/k8s/backend/product-service.yml"
              ;;
            user-service)
              repository="hiraya-user-service"
              manifest="gitops/k8s/backend/user-service.yml"
              ;;
            frontend)
              repository="hiraya-frontend"
              manifest="gitops/k8s/frontend/deployment.yml"
              ;;
            *)
              echo "Unknown service: $SERVICE" >&2
              exit 1
              ;;
          esac

          echo "repository=$repository" >> "$GITHUB_OUTPUT"
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"

      - name: Update image tag
        env:
          REPOSITORY: ${{ steps.service.outputs.repository }}
          MANIFEST: ${{ steps.service.outputs.manifest }}
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          image_uri="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPOSITORY}:${VERSION}"
          echo "Updating ${MANIFEST} -> ${image_uri}"
          sed -i "s|\(image: \).*|\1${image_uri}|g" "$MANIFEST"
          git --no-pager diff -- "$MANIFEST"

      - name: Commit and push manifest update
        env:
          SERVICE: ${{ inputs.service }}
          VERSION: ${{ inputs.version }}
          MANIFEST: ${{ steps.service.outputs.manifest }}
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- "$MANIFEST"; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST"
          git commit -m "ci: update ${SERVICE} image to ${VERSION} [skip ci]"

          max_retries=5
          attempt=1
          while [[ "$attempt" -le "$max_retries" ]]; do
            git fetch origin main

            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "Push succeeded on attempt ${attempt}."
                exit 0
              fi
            else
              echo "Rebase failed on attempt ${attempt}; aborting rebase before retry."
              git rebase --abort || true
            fi

            sleep_time=$(( 2 ** (attempt - 1) + RANDOM % 3 ))
            echo "Push failed on attempt ${attempt}; retrying in ${sleep_time}s."
            sleep "$sleep_time"
            attempt=$(( attempt + 1 ))
          done

          echo "Push failed after ${max_retries} attempts." >&2
          exit 1
