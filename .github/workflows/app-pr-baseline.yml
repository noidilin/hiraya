name: storefront-app-baseline

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: hiraya-app-pr-baseline-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  plan-app-pr:
    name: plan-app-pr
    runs-on: ubuntu-latest
    outputs:
      pr_kind: ${{ steps.classify-app-pr.outputs.pr_kind }}
      bot_manifest_promotion_only: ${{ steps.classify-app-pr.outputs.bot_manifest_promotion_only }}
      microservice_related: ${{ steps.classify-app-pr.outputs.microservice_related }}
      run_app_baseline: ${{ steps.classify-app-pr.outputs.run_app_baseline }}
      run_manifest_baseline: ${{ steps.classify-app-pr.outputs.run_manifest_baseline }}
      matrix: ${{ steps.classify-app-pr.outputs.matrix }}
      services: ${{ steps.classify-app-pr.outputs.services }}
      has_changes: ${{ steps.classify-app-pr.outputs.has_changes }}
      has_changed_service_images: ${{ steps.classify-app-pr.outputs.has_changed_service_images }}
      reason: ${{ steps.classify-app-pr.outputs.reason }}
    steps:
      - name: checkout-code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: set-up-node-from-root-toolchain
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: package.json

      - name: classify-app-pr
        id: classify-app-pr
        shell: bash
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          node .github/scripts/dist/classify-app-pr.mjs \
            --base "$PR_BASE_SHA" \
            --head "$PR_HEAD_SHA" \
            --author "$PR_AUTHOR" \
            --head-ref "$PR_HEAD_REF" \
            --github-output "$GITHUB_OUTPUT" \
            > /tmp/hiraya-app-pr-classification.json

          {
            echo "### App PR plan"
            echo ""
            echo '```json'
            cat /tmp/hiraya-app-pr-classification.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  manifest-promotion-baseline:
    name: manifest-promotion-baseline
    runs-on: ubuntu-latest
    needs: plan-app-pr
    if: ${{ needs.plan-app-pr.outputs.run_manifest_baseline == 'true' }}
    steps:
      - name: checkout-code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: set-up-node-from-root-toolchain
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: package.json

      - name: run-manifest-promotion-baseline
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize gitops/apps/vintage >/tmp/hiraya-gitops-rendered.yaml
          node .github/scripts/dist/assert-gitops-render.mjs --rendered /tmp/hiraya-gitops-rendered.yaml

  run-app-baseline:
    name: run-app-baseline
    runs-on: ubuntu-latest
    needs: plan-app-pr
    if: ${{ needs.plan-app-pr.outputs.run_app_baseline == 'true' }}
    steps:
      - name: checkout-code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: set-up-node-pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: install-root-workspace
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: run-app-baseline
        shell: bash
        run: pnpm run app:baseline

  image-build-only:
    name: image-build-only-${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: plan-app-pr
    if: ${{ needs.plan-app-pr.outputs.has_changed_service_images == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-app-pr.outputs.matrix) }}
    steps:
      - name: checkout-code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: set-up-docker-buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: build-docker-image-without-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.build_context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: hiraya-pr-build/${{ matrix.service }}:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha,scope=pr-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=pr-${{ matrix.service }}

      - name: summarize-build-only-image-gate
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Build-only Docker image gate — ${{ matrix.service }}"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Context | \`${{ matrix.build_context }}\` |"
            echo "| Dockerfile | \`${{ matrix.dockerfile }}\` |"
            echo "| Push | \`false\` |"
            echo "| AWS credentials | Not requested |"
          } >> "$GITHUB_STEP_SUMMARY"

  app-baseline:
    name: app-baseline
    runs-on: ubuntu-latest
    needs:
      - plan-app-pr
      - image-build-only
      - manifest-promotion-baseline
      - run-app-baseline
    if: ${{ always() }}
    steps:
      - name: summarize-app-baseline-gate
        shell: bash
        env:
          PLAN_RESULT: ${{ needs.plan-app-pr.result }}
          IMAGE_BUILD_ONLY_RESULT: ${{ needs.image-build-only.result }}
          MANIFEST_PROMOTION_BASELINE_RESULT: ${{ needs.manifest-promotion-baseline.result }}
          RUN_APP_BASELINE_RESULT: ${{ needs.run-app-baseline.result }}
          PR_KIND: ${{ needs.plan-app-pr.outputs.pr_kind }}
          BOT_MANIFEST_PROMOTION_ONLY: ${{ needs.plan-app-pr.outputs.bot_manifest_promotion_only }}
          MICROSERVICE_RELATED: ${{ needs.plan-app-pr.outputs.microservice_related }}
          HAS_CHANGED_SERVICE_IMAGES: ${{ needs.plan-app-pr.outputs.has_changed_service_images }}
          MATRIX: ${{ needs.plan-app-pr.outputs.matrix }}
          PLAN_REASON: ${{ needs.plan-app-pr.outputs.reason }}
        run: |
          set -euo pipefail
          {
            echo "### storefront-app-baseline gate"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| PR kind | \`${PR_KIND:-unknown}\` |"
            echo "| Plan reason | ${PLAN_REASON:-not-available} |"
            echo "| Bot manifest promotion fast path | \`${BOT_MANIFEST_PROMOTION_ONLY:-false}\` |"
            echo "| Microservice related | \`${MICROSERVICE_RELATED:-false}\` |"
            echo "| plan-app-pr | \`${PLAN_RESULT}\` |"
            echo "| image-build-only | \`${IMAGE_BUILD_ONLY_RESULT}\` |"
            echo "| manifest-promotion-baseline | \`${MANIFEST_PROMOTION_BASELINE_RESULT}\` |"
            echo "| run-app-baseline | \`${RUN_APP_BASELINE_RESULT}\` |"
            echo ""
            echo "Changed services detected from the service catalog:"
            echo ""
            echo '```json'
            printf '%s\n' "${MATRIX:-not-run}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$PLAN_RESULT" != "success" ]]; then
            echo "PR planning did not succeed: ${PLAN_RESULT}" >&2
            exit 1
          fi

          case "${PR_KIND:-unknown}" in
            manifest_promotion_only)
              if [[ "$IMAGE_BUILD_ONLY_RESULT" != "skipped" || "$RUN_APP_BASELINE_RESULT" != "skipped" || "$MANIFEST_PROMOTION_BASELINE_RESULT" != "success" ]]; then
                echo "Manifest promotion fast path expected manifest-promotion-baseline=success and normal app/image jobs=skipped." >&2
                exit 1
              fi
              ;;
            non_app)
              if [[ "$IMAGE_BUILD_ONLY_RESULT" != "skipped" || "$RUN_APP_BASELINE_RESULT" != "skipped" || "$MANIFEST_PROMOTION_BASELINE_RESULT" != "skipped" ]]; then
                echo "Non-app PR path expected all app/image/manifest jobs to be skipped." >&2
                exit 1
              fi
              ;;
            microservice_related)
              if [[ "$RUN_APP_BASELINE_RESULT" != "success" || "$MANIFEST_PROMOTION_BASELINE_RESULT" != "skipped" ]]; then
                echo "Microservice PR path expected run-app-baseline=success and manifest-promotion-baseline=skipped." >&2
                exit 1
              fi

              expected_image_build_only_result="skipped"
              if [[ "${HAS_CHANGED_SERVICE_IMAGES:-false}" == "true" ]]; then
                expected_image_build_only_result="success"
              fi
              if [[ "$IMAGE_BUILD_ONLY_RESULT" != "$expected_image_build_only_result" ]]; then
                echo "Microservice PR path expected image-build-only=${expected_image_build_only_result}, got ${IMAGE_BUILD_ONLY_RESULT}." >&2
                exit 1
              fi
              ;;
            *)
              echo "Unknown PR kind: ${PR_KIND:-unset}" >&2
              exit 1
              ;;
          esac
