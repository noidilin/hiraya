name: Vintage Storefront app baseline

on:
  pull_request:
    paths:
      - "app/microservices/**"
      - "gitops/**"
      - ".github/workflows/app-pr-baseline.yml"
      - ".github/scripts/**"
      - ".github/utils/services.json"
      - "docs/plan/vintage-storefront-test-baseline.md"

permissions:
  contents: read

concurrency:
  group: hiraya-app-pr-baseline-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  app-baseline:
    name: app-baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node from app toolchain
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: app/microservices/package.json
          cache: pnpm
          cache-dependency-path: app/microservices/pnpm-lock.yaml

      - name: Activate pinned pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Install app workspace
        shell: bash
        working-directory: app/microservices
        run: pnpm run app:install

      - name: Summarize changed app services
        shell: bash
        working-directory: app/microservices
        run: |
          set -euo pipefail
          git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > /tmp/hiraya-pr-changed-files.txt
          pnpm run app:changed -- --files-from /tmp/hiraya-pr-changed-files.txt > /tmp/hiraya-app-service-matrix.json

          {
            echo "### Vintage Storefront app baseline inputs"
            echo ""
            echo "Changed services detected from the service catalog:"
            echo ""
            echo '```json'
            cat /tmp/hiraya-app-service-matrix.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run app baseline
        shell: bash
        working-directory: app/microservices
        run: pnpm run app:baseline
