name: infra-ci

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - "gitops/**"
      - ".github/workflows/infra-ci.yml"
      - ".github/workflows/infra-deploy.yml"
      - ".github/workflows/infra-destroy.yml"
      - ".github/scripts/**"
      - ".mise.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hiraya-infra-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: static-infrastructure-checks
    runs-on: ubuntu-latest

    steps:
      - name: checkout-code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: install-toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: check-terraform-formatting
        shell: bash
        run: terraform fmt -check -recursive infra

      - name: validate-terraform-root-stacks-without-backend-credentials
        env:
          AWS_EC2_METADATA_DISABLED: "true"
          TF_VAR_skip_aws_credentials_validation: "true"
        shell: bash
        run: |
          set -euo pipefail
          for stack in \
            infra/envs/dev/bootstrap \
            infra/envs/dev/platform-core \
            infra/envs/dev/cluster-bootstrap; do
            terraform -chdir="$stack" init -backend=false -input=false
            terraform -chdir="$stack" validate -no-color
          done

      - name: run-terraform-module-contract-tests
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' test_file; do
            module=$(dirname "$(dirname "$test_file")")
            echo "Testing ${module}"
            terraform -chdir="$module" init -backend=false -input=false
            terraform -chdir="$module" test -no-color
          done < <(find infra/modules -path '*/tests/*.tftest.hcl' -print0 | sort -z)

      - name: render-gitops-manifests-and-helm-values
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/hiraya-gitops-rendered

          kubectl kustomize gitops/clusters/dev/root >/tmp/hiraya-gitops-rendered/root.yaml
          kubectl kustomize gitops/apps/vintage >/tmp/hiraya-gitops-rendered/vintage.yaml
          kubectl kustomize gitops/platform/namespaces >/tmp/hiraya-gitops-rendered/platform-namespaces.yaml
          kubectl kustomize gitops/platform/gateway-api-crds >/tmp/hiraya-gitops-rendered/platform-gateway-api-crds.yaml
          kubectl kustomize gitops/platform/external-secrets >/tmp/hiraya-gitops-rendered/platform-external-secrets.yaml
          kubectl kustomize gitops/platform/edge >/tmp/hiraya-gitops-rendered/platform-edge.yaml
          kubectl kustomize gitops/platform/argocd-access >/tmp/hiraya-gitops-rendered/platform-argocd-access.yaml
          kubectl kustomize gitops/platform/monitoring >/tmp/hiraya-gitops-rendered/platform-monitoring.yaml

          helm template aws-load-balancer-controller aws-load-balancer-controller --repo https://aws.github.io/eks-charts --version 3.4.0 --namespace kube-system -f gitops/platform/aws-load-balancer-controller/values-dev.yaml >/tmp/hiraya-gitops-rendered/aws-load-balancer-controller.yaml
          helm template external-dns external-dns --repo https://kubernetes-sigs.github.io/external-dns/ --version 1.20.0 --namespace external-dns -f gitops/platform/external-dns/values-dev.yaml >/tmp/hiraya-gitops-rendered/external-dns.yaml
          helm template external-secrets external-secrets --repo https://charts.external-secrets.io --version 0.10.7 --namespace external-secrets -f gitops/platform/external-secrets/values-dev.yaml >/tmp/hiraya-gitops-rendered/external-secrets.yaml
          helm template aws-for-fluent-bit aws-for-fluent-bit --repo https://aws.github.io/eks-charts --version 0.2.0 --namespace amazon-cloudwatch -f gitops/platform/logging/values-dev.yaml >/tmp/hiraya-gitops-rendered/aws-for-fluent-bit.yaml
          helm template kube-prometheus-stack kube-prometheus-stack --repo https://prometheus-community.github.io/helm-charts --version 56.21.0 --namespace monitoring -f gitops/platform/monitoring/values-dev.yaml >/tmp/hiraya-gitops-rendered/kube-prometheus-stack.yaml

      - name: install-kubeconform
        shell: bash
        run: |
          set -euo pipefail
          version=v0.7.0
          curl --fail --silent --show-error --location \
            "https://github.com/yannh/kubeconform/releases/download/${version}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform

      - name: schema-lint-rendered-gitops-manifests
        shell: bash
        run: |
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            /tmp/hiraya-gitops-rendered/*.yaml

      - name: render-local-helm-charts
        shell: bash
        run: |
          set -euo pipefail
          found_chart=false
          while IFS= read -r -d '' chart_file; do
            found_chart=true
            chart=$(dirname "$chart_file")
            echo "Rendering ${chart}"
            output="/tmp/$(echo "$chart" | tr '/ ' '--')-helm.yaml"
            helm template smoke "$chart" >"$output"
          done < <(find infra/modules -path '*/Chart.yaml' -print0)

          if [[ "$found_chart" == "false" ]]; then
            echo "No local Helm charts found under infra/modules."
          fi

  trusted-platform-plan:
    name: trusted-pr-terraform-plan
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && !(github.head_ref == 'ci/update-manifests-dev' && github.event.pull_request.user.login == 'app/hiraya-bot')
    runs-on: ubuntu-latest
    needs: static-checks
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write

    env:
      AWS_REGION: ap-northeast-1
      TF_STATE_BUCKET: devops-hiraya-dev-tf-state
      INFRA_PLAN_ROLE_ARN: arn:aws:iam::549475122024:role/devops-hiraya-dev-github-infra-plan
      PLATFORM_DIR: infra/envs/dev/platform-core
      PLAN_ARTIFACT_NAME: terraform-pr-plan-dev-platform-core-${{ github.event.pull_request.number }}-${{ github.sha }}

    steps:
      - name: checkout-code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: install-toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: configure-aws-credentials-with-plan-role
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ env.INFRA_PLAN_ROLE_ARN }}
          role-session-name: hiraya-infra-pr-plan-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: generate-platform-core-backend-config
        shell: bash
        run: .github/scripts/write-terraform-backend.sh platform-core

      - name: initialize-platform-terraform
        shell: bash
        run: terraform -chdir="${PLATFORM_DIR}" init -backend-config=backend.hcl -reconfigure -input=false

      - name: run-fast-platform-plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          set +e
          terraform -chdir="${PLATFORM_DIR}" plan \
            -input=false \
            -no-color \
            -refresh=false \
            -lock=false \
            -detailed-exitcode \
            | tee "${PLATFORM_DIR}/pr-plan.txt"
          plan_exit=${PIPESTATUS[0]}
          set -e
          if [[ "$plan_exit" -eq 1 ]]; then
            exit 1
          fi
          echo "exitcode=${plan_exit}" >> "$GITHUB_OUTPUT"

      - name: upload-full-plan-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PLAN_ARTIFACT_NAME }}
          path: ${{ env.PLATFORM_DIR }}/pr-plan.txt
          retention-days: 7

      - name: publish-sticky-plan-comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: .github/scripts/publish-terraform-plan-comment.sh "${PLATFORM_DIR}/pr-plan.txt" "${PLAN_ARTIFACT_NAME}"
