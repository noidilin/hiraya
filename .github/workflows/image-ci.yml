name: image-ci

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/microservices/**"
      - ".github/workflows/image-ci.yml"
      - ".github/utils/file-filters.yml"

permissions:
  contents: read

concurrency:
  group: hiraya-image-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single-account dev deployment values. Keep these aligned with infra/envs/dev/bootstrap/*.tfvars.
  AWS_REGION: ap-northeast-1
  AWS_ACCOUNT_ID: "549475122024"
  IMAGE_TAG: ${{ github.sha }}
  IMAGE_PUSH_ROLE_ARN: arn:aws:iam::549475122024:role/devops-hiraya-dev-github-image-push

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.service-matrix.outputs.matrix }}
      has_changes: ${{ steps.service-matrix.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Detect changed services
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: .github/utils/file-filters.yml

      - name: Build service matrix
        id: service-matrix
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            services='["auth","gateway","orders","order-service","product-service","user-service","frontend"]'
          else
            services='${{ steps.filter.outputs.changes }}'
          fi

          matrix=$(jq -cn --argjson services "$services" '
            def repository($service): {
              "auth": "hiraya-auth",
              "gateway": "hiraya-gateway",
              "orders": "hiraya-orders",
              "order-service": "hiraya-order-service",
              "product-service": "hiraya-product-service",
              "user-service": "hiraya-user-service",
              "frontend": "hiraya-frontend"
            }[$service];

            def dockerfile($service):
              if $service == "frontend" then
                "app/microservices/frontend/Dockerfile"
              else
                "app/microservices/backend/services/\($service)/Dockerfile"
              end;

            def manifest($service): {
              "auth": "gitops/k8s/backend/auth.yml",
              "gateway": "gitops/k8s/backend/gateway.yml",
              "orders": "gitops/k8s/backend/orders.yml",
              "order-service": "gitops/k8s/backend/order-service.yml",
              "product-service": "gitops/k8s/backend/product-service.yml",
              "user-service": "gitops/k8s/backend/user-service.yml",
              "frontend": "gitops/k8s/frontend/deployment.yml"
            }[$service];

            {
              include: [
                $services[]
                | {
                    service: .,
                    repository: repository(.),
                    build_context: "app/microservices",
                    dockerfile: dockerfile(.),
                    manifest: manifest(.)
                  }
              ]
            }
          ')

          count=$(jq -r '.include | length' <<< "$matrix")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          if [[ "$count" -gt 0 ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Selected services: $services"
          echo "Matrix: $matrix"

  build-and-push:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ env.IMAGE_PUSH_ROLE_ARN }}
          role-session-name: hiraya-image-ci-${{ github.run_id }}-${{ matrix.service }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR repository
        id: ecr
        shell: bash
        run: |
          set -euo pipefail
          REPOSITORY_URI=$(aws ecr describe-repositories \
            --repository-names "${{ matrix.repository }}" \
            --query 'repositories[0].repositoryUri' \
            --output text)
          echo "repository_uri=${REPOSITORY_URI}" >> "$GITHUB_OUTPUT"
          echo "registry=${REPOSITORY_URI%/*}" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        shell: bash
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" | \
            docker login --username AWS --password-stdin "${{ steps.ecr.outputs.registry }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@1583c0f09d26c58c59d25b0eef29792b7ce99d9a # v3.11.1

      - name: Build Docker image
        uses: docker/build-push-action@ccc2b40e9ea6518f9252a22a990f8e868370f62e # v6.18.0
        with:
          context: ${{ matrix.build_context }}
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ steps.ecr.outputs.repository_uri }}:${{ env.IMAGE_TAG }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan Docker image with Trivy
        id: trivy-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.ecr.outputs.repository_uri }}:${{ env.IMAGE_TAG }}
          format: table
          output: trivy-${{ matrix.service }}.txt
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          scanners: vuln

      - name: Publish Trivy scan summary
        if: ${{ always() }}
        env:
          TRIVY_REPORT: trivy-${{ matrix.service }}.txt
          TRIVY_OUTCOME: ${{ steps.trivy-scan.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Trivy image scan — ${{ matrix.service }}"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${{ steps.ecr.outputs.repository_uri }}:${IMAGE_TAG}\` |"
            echo "| Mode | Advisory only while CI/CD is stabilizing |"
            echo "| Step outcome | \`${TRIVY_OUTCOME}\` |"
            echo "| Severity filter | \`HIGH,CRITICAL\` |"
            echo "| Unfixed vulnerabilities | Ignored |"
            echo ""

            if [[ -s "$TRIVY_REPORT" ]]; then
              echo "<details><summary>Trivy output</summary>"
              echo ""
              echo '```text'
              cat "$TRIVY_REPORT"
              echo '```'
              echo "</details>"
            else
              echo "_No Trivy report was generated. Check the Trivy scan step logs._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.ecr.outputs.repository_uri }}:${IMAGE_TAG}"

  update-manifests:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-and-push
    if: ${{ github.ref == 'refs/heads/main' && needs.detect-changes.outputs.has_changes == 'true' }}
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          persist-credentials: false

      - name: Update image tags
        env:
          MATRIX: ${{ needs.detect-changes.outputs.matrix }}
        shell: bash
        run: |
          set -euo pipefail

          jq -c '.include[]' <<< "$MATRIX" | while read -r service; do
            repository=$(jq -r '.repository' <<< "$service")
            manifest=$(jq -r '.manifest' <<< "$service")
            image_uri="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${repository}:${IMAGE_TAG}"

            echo "Updating ${manifest} -> ${image_uri}"
            image_line_count=$(grep -Ec '^[[:space:]]*image: ' "$manifest" || true)
            if [[ "$image_line_count" -ne 1 ]]; then
              echo "Expected exactly one image field in ${manifest}, found ${image_line_count}." >&2
              exit 1
            fi
            sed -i -E "s|^([[:space:]]*image: ).*|\1${image_uri}|" "$manifest"
          done

          git --no-pager diff -- gitops/

      - name: Validate rendered GitOps manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize gitops >/tmp/hiraya-gitops-rendered.yaml

      - name: Commit and push manifest updates
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- gitops/; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops/
          git commit -m "ci: update image tags for ${IMAGE_TAG} [skip ci]"

          max_retries=5
          attempt=1
          while [[ "$attempt" -le "$max_retries" ]]; do
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: bearer ${GITHUB_TOKEN}" fetch origin main

            if git rebase origin/main; then
              if git -c "http.https://github.com/.extraheader=AUTHORIZATION: bearer ${GITHUB_TOKEN}" push origin HEAD:main; then
                echo "Push succeeded on attempt ${attempt}."
                exit 0
              fi
            else
              echo "Rebase failed on attempt ${attempt}; aborting rebase before retry."
              git rebase --abort || true
            fi

            sleep_time=$(( 2 ** (attempt - 1) + RANDOM % 3 ))
            echo "Push failed on attempt ${attempt}; retrying in ${sleep_time}s."
            sleep "$sleep_time"
            attempt=$(( attempt + 1 ))
          done

          echo "Push failed after ${max_retries} attempts." >&2
          exit 1

