name: image-ci

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/microservices/**"
      - ".github/workflows/image-ci.yml"
      - ".github/scripts/**"
      - ".github/utils/services.json"

permissions:
  contents: read

concurrency:
  group: hiraya-image-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single-account dev deployment values. Keep these aligned with infra/envs/dev/bootstrap/*.tfvars.
  AWS_REGION: ap-northeast-1
  AWS_ACCOUNT_ID: "549475122024"
  IMAGE_TAG: ${{ github.sha }}
  IMAGE_PUSH_ROLE_ARN: arn:aws:iam::549475122024:role/devops-hiraya-dev-github-image-push

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.service-matrix.outputs.matrix }}
      has_changes: ${{ steps.service-matrix.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node from app toolchain
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: app/microservices/package.json

      - name: Activate pinned pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Install app workspace
        shell: bash
        working-directory: app/microservices
        run: pnpm run app:install

      - name: Detect changed services
        id: service-matrix
        shell: bash
        working-directory: app/microservices
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            pnpm run app:changed -- --all --github-output "$GITHUB_OUTPUT" > /tmp/hiraya-app-service-matrix.json
          else
            before="${{ github.event.before }}"
            if [[ -z "$before" || "$before" =~ ^0+$ ]]; then
              git diff --name-only HEAD~1..HEAD > /tmp/hiraya-main-changed-files.txt
            else
              git diff --name-only "${before}...${{ github.sha }}" > /tmp/hiraya-main-changed-files.txt
            fi
            pnpm run app:changed -- --files-from /tmp/hiraya-main-changed-files.txt --github-output "$GITHUB_OUTPUT" > /tmp/hiraya-app-service-matrix.json
          fi

          {
            echo "### Main image CI changed service inputs"
            echo ""
            echo "Changed services detected from the service catalog:"
            echo ""
            echo '```json'
            cat /tmp/hiraya-app-service-matrix.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  app-baseline:
    name: Run app baseline before image push
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node from app toolchain
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: app/microservices/package.json

      - name: Activate pinned pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Summarize baseline gate
        env:
          MATRIX: ${{ needs.detect-changes.outputs.matrix }}
          HAS_CHANGES: ${{ needs.detect-changes.outputs.has_changes }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Main image push baseline validation"
            echo ""
            echo "The reusable Vintage Storefront app baseline runs before AWS OIDC, ECR login, image push, or GitOps manifest updates."
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Changed service images | \`${HAS_CHANGES}\` |"
            echo ""
            echo '```json'
            printf '%s\n' "$MATRIX"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install app workspace
        shell: bash
        working-directory: app/microservices
        run: pnpm run app:install

      - name: Run app baseline
        shell: bash
        working-directory: app/microservices
        run: pnpm run app:baseline

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - app-baseline
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Summarize image push gate
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Image build and push — ${{ matrix.service }}"
            echo ""
            echo "Baseline validation passed; this job may now request AWS OIDC credentials, log in to ECR, build, scan, and push the image."
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Repository | \`${{ matrix.repository }}\` |"
            echo "| Context | \`${{ matrix.build_context }}\` |"
            echo "| Dockerfile | \`${{ matrix.dockerfile }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ env.IMAGE_PUSH_ROLE_ARN }}
          role-session-name: hiraya-image-ci-${{ github.run_id }}-${{ matrix.service }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR repository
        id: ecr
        shell: bash
        run: |
          set -euo pipefail
          REPOSITORY_URI=$(aws ecr describe-repositories \
            --repository-names "${{ matrix.repository }}" \
            --query 'repositories[0].repositoryUri' \
            --output text)
          echo "repository_uri=${REPOSITORY_URI}" >> "$GITHUB_OUTPUT"
          echo "registry=${REPOSITORY_URI%/*}" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        shell: bash
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" | \
            docker login --username AWS --password-stdin "${{ steps.ecr.outputs.registry }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@1583c0f09d26c58c59d25b0eef29792b7ce99d9a # v3.11.1

      - name: Build Docker image
        uses: docker/build-push-action@ccc2b40e9ea6518f9252a22a990f8e868370f62e # v6.18.0
        with:
          context: ${{ matrix.build_context }}
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ steps.ecr.outputs.repository_uri }}:${{ env.IMAGE_TAG }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan Docker image with Trivy
        id: trivy-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.ecr.outputs.repository_uri }}:${{ env.IMAGE_TAG }}
          format: table
          output: trivy-${{ matrix.service }}.txt
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          scanners: vuln

      - name: Publish Trivy scan summary
        if: ${{ always() }}
        env:
          TRIVY_REPORT: trivy-${{ matrix.service }}.txt
          TRIVY_OUTCOME: ${{ steps.trivy-scan.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Trivy image scan — ${{ matrix.service }}"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${{ steps.ecr.outputs.repository_uri }}:${IMAGE_TAG}\` |"
            echo "| Mode | Advisory only while CI/CD is stabilizing |"
            echo "| Step outcome | \`${TRIVY_OUTCOME}\` |"
            echo "| Severity filter | \`HIGH,CRITICAL\` |"
            echo "| Unfixed vulnerabilities | Ignored |"
            echo ""

            if [[ -s "$TRIVY_REPORT" ]]; then
              echo "<details><summary>Trivy output</summary>"
              echo ""
              echo '```text'
              cat "$TRIVY_REPORT"
              echo '```'
              echo "</details>"
            else
              echo "_No Trivy report was generated. Check the Trivy scan step logs._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.ecr.outputs.repository_uri }}:${IMAGE_TAG}"

  update-manifests:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - app-baseline
      - build-and-push
    if: ${{ github.ref == 'refs/heads/main' && needs.detect-changes.outputs.has_changes == 'true' }}
    permissions:
      contents: read

    env:
      PROMOTION_BRANCH: ci/update-manifests-dev

    steps:
      - name: Validate GitHub App secrets
        env:
          APP_ID: ${{ secrets.HIRAYA_BOT_APP_ID }}
          PRIVATE_KEY: ${{ secrets.HIRAYA_BOT_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$APP_ID" || -z "$PRIVATE_KEY" ]]; then
            echo "Missing HIRAYA_BOT_APP_ID or HIRAYA_BOT_PRIVATE_KEY repository secret." >&2
            echo "Create and install the Hiraya GitHub App before enabling manifest promotion." >&2
            exit 1
          fi

      - name: Create Hiraya bot token
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.HIRAYA_BOT_APP_ID }}
          private-key: ${{ secrets.HIRAYA_BOT_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 0

      - name: Prepare rolling promotion branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$PROMOTION_BRANCH:refs/remotes/origin/$PROMOTION_BRANCH" || true
          git checkout -B "$PROMOTION_BRANCH" origin/main

      - name: Update image tags
        env:
          MATRIX: ${{ needs.detect-changes.outputs.matrix }}
        shell: bash
        run: |
          set -euo pipefail

          jq -c '.include[]' <<< "$MATRIX" | while read -r service; do
            repository=$(jq -r '.repository' <<< "$service")
            manifest=$(jq -r '.manifest' <<< "$service")
            image_uri="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${repository}:${IMAGE_TAG}"

            echo "Updating ${manifest} -> ${image_uri}"
            image_line_count=$(grep -Ec '^[[:space:]]*image: ' "$manifest" || true)
            if [[ "$image_line_count" -ne 1 ]]; then
              echo "Expected exactly one image field in ${manifest}, found ${image_line_count}." >&2
              exit 1
            fi
            sed -i -E "s|^([[:space:]]*image: ).*|\1${image_uri}|" "$manifest"
          done

          git --no-pager diff -- gitops/

      - name: Validate rendered GitOps manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize gitops >/tmp/hiraya-gitops-rendered.yaml

      - name: Commit manifest updates
        id: commit-manifests
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- gitops/; then
            echo "No manifest changes to promote."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "hiraya-bot[bot]"
          git config user.email "hiraya-bot[bot]@users.noreply.github.com"
          git add gitops/
          git commit -m "ci: update image tags for ${IMAGE_TAG}"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push manifest promotion branch
        if: ${{ steps.commit-manifests.outputs.has_changes == 'true' }}
        env:
          BOT_TOKEN: ${{ steps.bot-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${BOT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force-with-lease origin "HEAD:${PROMOTION_BRANCH}"

      - name: Open or update manifest promotion PR
        if: ${{ steps.commit-manifests.outputs.has_changes == 'true' }}
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          PR_TITLE: "ci: promote dev images for ${{ env.IMAGE_TAG }}"
          MATRIX: ${{ needs.detect-changes.outputs.matrix }}
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/hiraya-manifest-promotion-pr.md <<EOF
          ## Dev image promotion

          Promotes images built and pushed by image-ci run ${GITHUB_RUN_ID}.

          - Source commit: ${IMAGE_TAG}
          - Promotion branch: ${PROMOTION_BRANCH}
          - Required check before merge: app-baseline
          - Merge method: squash auto-merge

          ### Changed service images

          \`\`\`json
          ${MATRIX}
          \`\`\`
          EOF

          existing_pr=$(gh pr list \
            --base main \
            --head "$PROMOTION_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // ""')

          if [[ -z "$existing_pr" ]]; then
            pr_url=$(gh pr create \
              --base main \
              --head "$PROMOTION_BRANCH" \
              --title "$PR_TITLE" \
              --body-file /tmp/hiraya-manifest-promotion-pr.md)
          else
            gh pr edit "$existing_pr" \
              --title "$PR_TITLE" \
              --body-file /tmp/hiraya-manifest-promotion-pr.md
            pr_url=$(gh pr view "$existing_pr" --json url --jq '.url')
          fi

          gh pr merge "$pr_url" --auto --squash --delete-branch

          {
            echo "### Manifest promotion PR"
            echo ""
            echo "Opened or updated ${pr_url} and enabled squash auto-merge after required checks pass."
          } >> "$GITHUB_STEP_SUMMARY"
