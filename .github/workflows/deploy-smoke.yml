name: deploy-smoke

on:
  push:
    branches: [main]
    paths:
      - "gitops/**"

permissions:
  contents: read

concurrency:
  group: hiraya-deploy-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-storefront-smoke:
    name: public-storefront-smoke
    runs-on: ubuntu-latest
    steps:
      - name: checkout-code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: set-up-node-pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: install-root-workspace
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: run-public-storefront-deploy-smoke
        shell: bash
        run: pnpm run app:smoke:public
