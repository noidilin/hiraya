name: deploy-smoke

on:
  push:
    branches: [main]
    paths:
      - "gitops/**"

permissions:
  contents: read

concurrency:
  group: hiraya-deploy-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-storefront-smoke:
    name: public-storefront-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node from app toolchain
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: app/microservices/package.json

      - name: Activate pinned pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Run public Storefront deploy smoke
        shell: bash
        working-directory: app/microservices
        run: pnpm run app:smoke:public
