name: infra-deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hiraya-infra-dev-platform
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  TF_STATE_BUCKET: devops-hiraya-dev-tf-state
  INFRA_PLAN_ROLE_ARN: arn:aws:iam::549475122024:role/devops-hiraya-dev-github-infra-plan
  INFRA_APPLY_ROLE_ARN: arn:aws:iam::549475122024:role/devops-hiraya-dev-github-infra-apply
  CLUSTER_BOOTSTRAP_ROLE_ARN: arn:aws:iam::549475122024:role/devops-hiraya-dev-github-cluster-bootstrap
  PLATFORM_DIR: infra/envs/dev/platform-core
  CLUSTER_BOOTSTRAP_DIR: infra/envs/dev/cluster-bootstrap

jobs:
  preflight-plan:
    name: pre-approval-platform-core-plan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: checkout-code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: install-toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: configure-aws-credentials-with-plan-role
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ env.INFRA_PLAN_ROLE_ARN }}
          role-session-name: hiraya-infra-deploy-plan-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: generate-platform-core-backend-config
        shell: bash
        run: .github/scripts/write-terraform-backend.sh platform-core

      - name: initialize-and-validate-platform-terraform
        shell: bash
        run: |
          terraform -chdir="${PLATFORM_DIR}" init -backend-config=backend.hcl -reconfigure -input=false
          terraform -chdir="${PLATFORM_DIR}" validate -no-color

      - name: run-full-refreshed-pre-approval-plan
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="${PLATFORM_DIR}" plan -input=false -no-color | tee "${PLATFORM_DIR}/preflight-plan.txt"

      - name: upload-pre-approval-plan-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-preflight-plan-dev-platform-core-${{ github.sha }}
          path: ${{ env.PLATFORM_DIR }}/preflight-plan.txt
          retention-days: 14

      - name: summarize-pre-approval-plan
        shell: bash
        run: |
          set -euo pipefail
          plan_file="${PLATFORM_DIR}/preflight-plan.txt"
          summary=$(grep -E '^(Plan:|No changes\.)' "$plan_file" | tail -1 || true)
          if [[ -z "$summary" ]]; then
            summary="Summary unavailable; inspect the uploaded plan artifact."
          fi

          {
            echo "## Pre-approval Terraform plan"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Stack | \`${PLATFORM_DIR}\` |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Mode | Full refreshed Platform Core plan before \`dev\` approval |"
            echo "| Summary | \`${summary}\` |"
            echo "| Full plan | Artifact \`terraform-preflight-plan-dev-platform-core-${GITHUB_SHA}\` |"
            echo
            echo "<details><summary>Show plan excerpt</summary>"
            echo
            echo '```terraform'
            head -c 55000 "$plan_file"
            if [[ $(wc -c <"$plan_file") -gt 55000 ]]; then
              echo
              echo "...truncated; see workflow artifact for full plan..."
            fi
            echo
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  apply-approved-dev-platform:
    name: apply-approved-dev-platform
    needs: preflight-plan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: checkout-code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: install-toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: generate-layered-backend-configs
        shell: bash
        run: |
          .github/scripts/write-terraform-backend.sh platform-core
          .github/scripts/write-terraform-backend.sh cluster-bootstrap

      - name: configure-aws-credentials-with-platform-core-apply-role
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ env.INFRA_APPLY_ROLE_ARN }}
          role-session-name: hiraya-infra-apply-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: initialize-platform-terraform
        shell: bash
        run: terraform -chdir="${PLATFORM_DIR}" init -backend-config=backend.hcl -reconfigure -input=false

      - name: create-fresh-approved-binary-plan
        shell: bash
        run: terraform -chdir="${PLATFORM_DIR}" plan -input=false -out=tfplan.binary

      - name: apply-approved-binary-plan
        id: platform_apply
        shell: bash
        run: terraform -chdir="${PLATFORM_DIR}" apply -input=false -auto-approve tfplan.binary

      - name: summarize-platform-core-deployment
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          PLATFORM_APPLY_OUTCOME: ${{ steps.platform_apply.outcome }}
        run: |
          case "$PLATFORM_APPLY_OUTCOME" in
            success)
              message="Terraform applied the AWS-only Platform Core foundation after the single dev environment approval. Cluster Bootstrap runs next with the dedicated bootstrap role."
              ;;
            failure)
              message="Platform Core apply failed after approval. Cluster Bootstrap and smoke validation should not be treated as completed; inspect the failed Terraform step."
              ;;
            skipped)
              message="Platform Core apply did not run because an earlier approved-job step failed or was skipped. No downstream deployment phase should be inferred from this run."
              ;;
            *)
              message="Platform Core apply outcome was ${PLATFORM_APPLY_OUTCOME:-unknown}; inspect the workflow log before treating the deployment as complete."
              ;;
          esac

          {
            echo "## Platform Core deploy"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Stack | \`${PLATFORM_DIR}\` |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Environment | \`dev\` |"
            echo "| Result | \`${JOB_STATUS}\` |"
            echo "| Platform apply | \`${PLATFORM_APPLY_OUTCOME:-unknown}\` |"
            echo
            echo "$message"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: configure-aws-credentials-with-cluster-bootstrap-role
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ env.CLUSTER_BOOTSTRAP_ROLE_ARN }}
          role-session-name: hiraya-cluster-bootstrap-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: initialize-and-validate-cluster-bootstrap-terraform
        shell: bash
        run: |
          terraform -chdir="${CLUSTER_BOOTSTRAP_DIR}" init -backend-config=backend.hcl -reconfigure -input=false
          terraform -chdir="${CLUSTER_BOOTSTRAP_DIR}" validate -no-color

      - name: create-cluster-bootstrap-binary-plan
        shell: bash
        run: terraform -chdir="${CLUSTER_BOOTSTRAP_DIR}" plan -input=false -out=tfplan.binary

      - name: apply-cluster-bootstrap-binary-plan
        id: cluster_bootstrap_apply
        shell: bash
        run: terraform -chdir="${CLUSTER_BOOTSTRAP_DIR}" apply -input=false -auto-approve tfplan.binary

      - name: summarize-cluster-bootstrap
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          CLUSTER_BOOTSTRAP_OUTCOME: ${{ steps.cluster_bootstrap_apply.outcome }}
        run: |
          case "$CLUSTER_BOOTSTRAP_OUTCOME" in
            success)
              message="Cluster Bootstrap installed Argo CD/root GitOps after the same dev environment approval. Smoke validation runs next through Kubernetes plus public route checks without Argo CD API credentials."
              ;;
            failure)
              message="Cluster Bootstrap apply failed after Platform Core. Smoke validation should not be treated as completed; inspect the failed Terraform step."
              ;;
            skipped)
              message="Cluster Bootstrap apply did not run because an earlier approved-job step failed or was skipped. Argo CD/root GitOps installation is not implied by this summary."
              ;;
            *)
              message="Cluster Bootstrap apply outcome was ${CLUSTER_BOOTSTRAP_OUTCOME:-unknown}; inspect the workflow log before treating GitOps bootstrap as complete."
              ;;
          esac

          {
            echo "## Cluster Bootstrap"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Stack | \`${CLUSTER_BOOTSTRAP_DIR}\` |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Result | \`${JOB_STATUS}\` |"
            echo "| Cluster Bootstrap apply | \`${CLUSTER_BOOTSTRAP_OUTCOME:-unknown}\` |"
            echo
            echo "$message"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: refresh-aws-credentials-with-cluster-bootstrap-role-for-smoke
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ env.CLUSTER_BOOTSTRAP_ROLE_ARN }}
          role-session-name: hiraya-platform-smoke-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: initialize-platform-core-state-for-smoke-outputs
        shell: bash
        run: terraform -chdir="${PLATFORM_DIR}" init -backend-config=backend.hcl -reconfigure -input=false

      - name: run-platform-route-smoke-checks
        id: platform_smoke
        shell: bash
        run: .github/scripts/platform-route-smoke.sh

      - name: summarize-platform-smoke
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          PLATFORM_SMOKE_OUTCOME: ${{ steps.platform_smoke.outcome }}
        run: |
          case "$PLATFORM_SMOKE_OUTCOME" in
            success)
              message="Validated Argo Application sync/health, required namespaces, Gateway/HTTPRoute readiness, and public routes using the Cluster Bootstrap role. No Argo CD API credentials are used."
              ;;
            failure)
              message="Dev Platform smoke checks ran and failed. Treat deployment health as unverified until the failed checks are resolved."
              ;;
            skipped)
              message="Dev Platform smoke checks did not run because an earlier approved-job phase failed or was skipped. Runtime convergence and public route health are not verified by this run."
              ;;
            *)
              message="Dev Platform smoke outcome was ${PLATFORM_SMOKE_OUTCOME:-unknown}; inspect the workflow log before treating the platform as validated."
              ;;
          esac

          {
            echo "## Dev Platform smoke"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Stack outputs | \`${PLATFORM_DIR}\` |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Result | \`${JOB_STATUS}\` |"
            echo "| Smoke checks | \`${PLATFORM_SMOKE_OUTCOME:-unknown}\` |"
            echo
            echo "$message"
          } >> "$GITHUB_STEP_SUMMARY"
