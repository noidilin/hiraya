# Transitional legacy service path filters for dorny/paths-filter.
# Superseded for new app baseline work by .github/utils/services.json and
# .github/scripts/src/detect-changed-services.mts, compiled to
# .github/scripts/dist/detect-changed-services.mjs for runtime use. Those files
# are the canonical service metadata and changed-service detection path.
# Keep this file only for existing image CI compatibility until that workflow is
# migrated. During the transition, update services.json first; update this file
# too only when the legacy image workflow must keep recognizing the same paths.

auth:
  - "app/microservices/backend/services/auth/**"
  - "app/microservices/backend/shared/**"
  - "app/microservices/backend/package.json"
  - "app/microservices/.dockerignore"
  - "app/microservices/package.json"
  - "app/microservices/pnpm-lock.yaml"
  - "app/microservices/pnpm-workspace.yaml"
  - ".github/workflows/image-ci.yml"
  - ".github/utils/file-filters.yml"

