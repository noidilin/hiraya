# Service path filters for dorny/paths-filter.
# Keys match Hiraya service names used by the image build matrix.

auth:
  - "app/microservices/backend/services/auth/**"
  - "app/microservices/backend/shared/**"
  - "app/microservices/backend/package.json"
  - ".github/workflows/ci.yml"
  - ".github/utils/file-filters.yml"

