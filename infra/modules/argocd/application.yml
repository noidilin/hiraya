# Terraform installs this root GitOps Application after the Argo CD CRDs exist.
# This is the root GitOps Application for the dev cluster.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vintage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/noidilin/hiraya.git"
    targetRevision: main
    path: gitops
  destination:
    server: "https://kubernetes.default.svc"
    namespace: vintage
  # syncPolicy: {} # disable manual sync after pipeline stable
  syncPolicy:
    automated:
      prune: true # delete resources removed from git
      selfHeal: true # re-sync if someone manually changes the cluster
