apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: vintage
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: 549475122024.dkr.ecr.ap-northeast-1.amazonaws.com/hiraya-gateway:adfc4804393e7f4c63c5045e75f7821b1bb3721d
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: development
            - name: PORT
              value: "3001"
            - name: AUTH_SERVICE_URL
              value: "http://auth:3002"
            - name: PRODUCTS_SERVICE_URL
              value: "http://product-service:3003"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:3004"
            - name: ORDERS_SERVICE_URL
              value: "http://orders:3005"
            - name: USERS_SERVICE_URL
              value: "http://user-service:3006"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: vintage
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http   
      protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP

