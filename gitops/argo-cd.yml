apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vintage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/noidilin/hiraya.git"
    targetRevision: main
    path: gitops
  destination:
    server: "https://kubernetes.default.svc"
    namespace: vintage
  syncPolicy: {}
