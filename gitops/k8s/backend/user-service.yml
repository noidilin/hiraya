apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: vintage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/hiraya-user-service:1ebec3729cd10fe1eeac6f0858fba58e2da07956
          ports:
            - containerPort: 3006
          env:
            - name: NODE_ENV
              value: development
            - name: PORT
              value: "3006"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vintage-secrets
                  key: USERS_DB_URL

--- 

apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: vintage
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 3006
      targetPort: 3006
  type: ClusterIP
