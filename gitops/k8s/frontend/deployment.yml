apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: vintage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 549475122024.dkr.ecr.ap-northeast-1.amazonaws.com/hiraya-frontend:02dde836805cbbd59f3699c9511a918c81255206
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: vintage
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 80
  type: ClusterIP

