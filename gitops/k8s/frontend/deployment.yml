apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: vintage
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 549475122024.dkr.ecr.ap-northeast-1.amazonaws.com/hiraya-frontend:c240d86b755cab0bba4ea7528232b628d6e72dec
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: vintage
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 80
  type: ClusterIP

