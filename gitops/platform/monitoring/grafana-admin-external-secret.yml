apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: hiraya-dev-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: /hiraya/dev/platform/grafana-admin
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: /hiraya/dev/platform/grafana-admin
        property: admin-password
