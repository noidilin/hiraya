provider:
  name: aws

sources:
  - gateway-httproute

gatewayNamespace: edge
extraArgs:
  gateway-name: public

policy: sync
registry: txt
txtOwnerId: hiraya-dev-eks
# ExternalDNS matches Route53 hosted zones from domainFilters before it
# considers individual Gateway/HTTPRoute hostnames. The hosted zone is the
# parent zone (noidilin.dev), while app records live under hiraya.noidilin.dev.
domainFilters:
  - noidilin.dev
triggerLoopOnEvent: true

serviceAccount:
  create: true
  name: external-dns
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::549475122024:role/devops-hiraya-dev-eks-external-dns
